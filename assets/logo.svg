<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" role="img" aria-label="SpectraGlyph logo">
  <title>SpectraGlyph</title>
  <defs>
    <linearGradient id="sg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2430"/>
      <stop offset="1" stop-color="#0f1218"/>
    </linearGradient>
    <filter id="sg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="32" ry="32" fill="url(#sg-bg)"/>
  <g transform="translate(28, 50)" filter="url(#sg-glow)">
    <rect x="0"   y="32" width="16" height="28" rx="3" fill="#440154"/>
    <rect x="20"  y="18" width="16" height="56" rx="3" fill="#3b528b"/>
    <rect x="40"  y="8"  width="16" height="76" rx="3" fill="#21918c"/>
    <rect x="60"  y="0"  width="16" height="92" rx="3" fill="#fde725"/>
    <rect x="80"  y="8"  width="16" height="76" rx="3" fill="#21918c"/>
    <rect x="100" y="18" width="16" height="56" rx="3" fill="#3b528b"/>
    <rect x="120" y="32" width="16" height="28" rx="3" fill="#440154"/>
  </g>
</svg>
